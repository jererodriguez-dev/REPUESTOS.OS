<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RepuestOS — Panel de Control Integrado</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0f19; --bg-card: rgba(22, 30, 49, 0.7); --border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6; --text-muted: #9ca3af; --accent: #3b82f6; --accent-hover: #2563eb;
      --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --r: 12px;
    }
    body {
      background: linear-gradient(to bottom, #0b0f19, #111827); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 13px; line-height: 1.5; min-height: 100vh;
    }
    header {
      background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 50;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; color: #fff; }
    .brand i { color: var(--accent); }
    .nav-links { display: flex; gap: 6px; }
    .nav-btn {
      background: none; border: none; color: var(--text-muted); padding: 8px 16px; border-radius: var(--r);
      cursor: pointer; font-weight: 500; display: flex; align-items: center; gap: 8px; transition: all 0.2s;
    }
    .nav-btn:hover, .nav-btn.active { color: #fff; background: rgba(255, 255, 255, 0.05); }
    .nav-btn.active { color: var(--accent); background: rgba(59, 130, 246, 0.1); }
    main { padding: 24px; max-width: 1600px; margin: 0 auto; display: grid; grid-template-columns: 280px 1fr; gap: 24px; }
    aside { display: flex; flex-direction: column; gap: 20px; }
    .panel {
      background: var(--bg-card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: var(--r); padding: 20px;
    }
    .panel-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);
      font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;
    }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .stat-card {
      background: var(--bg-card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: var(--r); padding: 20px; display: flex; align-items: center; gap: 16px;
    }
    .stat-icon {
      width: 46px; height: 46px; border-radius: 10px; background: rgba(255, 255, 255, 0.03);
      display: flex; align-items: center; justify-content: center; color: var(--accent);
    }
    .stat-icon.success { color: var(--success); background: rgba(16, 185, 129, 0.1); }
    .stat-icon.danger { color: var(--danger); background: rgba(239, 68, 68, 0.1); }
    .stat-icon.warning { color: var(--warning); background: rgba(245, 158, 11, 0.1); }
    .stat-num { font-size: 24px; font-weight: 700; color: #fff; margin-top: 4px; letter-spacing: -0.5px; }
    .stat-label { font-size: 12px; color: var(--text-muted); }
    .view-section { display: none; }
    .view-section.active { display: block; animation: fadeIn 0.3s ease; }
    .table-container { width: 100%; overflow-x: auto; margin-top: 16px; border-radius: 8px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; text-align: left; background: rgba(0,0,0,0.1); }
    th { background: rgba(255,255,255,0.02); color: var(--text-muted); font-weight: 600; padding: 12px 16px; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
    td { padding: 14px 16px; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255, 255, 255, 0.02); }
    .btn {
      background: var(--accent); color: #fff; border: none; padding: 10px 16px; border-radius: var(--r);
      font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s;
    }
    .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-sec { background: rgba(255, 255, 255, 0.05); color: var(--text); border: 1px solid var(--border); }
    .btn-sec:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select, textarea { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); padding: 10px 14px; border-radius: var(--r); color: #fff; font-family: inherit; font-size: 13px; transition: all 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(0, 0, 0, 0.4); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 7, 12, 0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 100; animation: fadeIn 0.2s ease; }
    .modal-content { background: #111827; border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 520px; padding: 24px; position: relative; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
    .modal-close { position: absolute; top: 20px; right: 20px; background: none; border: none; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
    .modal-close:hover { color: #fff; }
    #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #070a13; display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .auth-box { background: rgba(17, 24, 39, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .badge { padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 500; display: inline-block; }
    .badge-low { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .badge-ok { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="brand" style="justify-content:center; margin-bottom:32px; font-size:22px">
      <i data-lucide="layers"></i> RepuestOS <span style="font-weight:300; color:var(--text-muted)">v2.5</span>
    </div>
    <form id="auth-form">
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" id="auth-email" required placeholder="administrador@repuestos.com">
      </div>
      <div class="form-group" style="margin-bottom:24px">
        <label>Contraseña</label>
        <input type="password" id="auth-password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn" style="width:100%; justify-content:center; padding:12px">Entrar al Panel de Control</button>
      <div id="auth-error" style="color:var(--danger); font-size:12px; margin-top:14px; text-align:center; display:none; background:rgba(239,68,68,0.1); padding:8px; border-radius:8px;"></div>
    </form>
  </div>
</div>

<header>
  <div class="brand"><i data-lucide="layers"></i> RepuestOS <span style="color:var(--text-muted); font-weight:400; font-size:12px; background:rgba(255,255,255,0.05); padding:2px 6px; border-radius:4px;">PRO v2.5</span></div>
  <div class="nav-links">
    <button class="nav-btn active" data-view="dashboard"><i data-lucide="layout-dashboard"></i>Dashboard</button>
    <button class="nav-btn" data-view="catalogo"><i data-lucide="package"></i>Catálogo</button>
    <button class="nav-btn" data-view="ventas"><i data-lucide="shopping-cart"></i>Nueva Venta</button>
  </div>
  <button class="btn-sec nav-btn" id="btn-logout" style="padding:6px 14px"><i data-lucide="log-out"></i>Salir</button>
</header>

<main>
  <aside>
    <div class="panel">
      <div class="panel-title">Operaciones</div>
      <button class="btn" id="btn-nuevo-art" style="width:100%; margin-bottom:10px"><i data-lucide="plus-circle"></i>Nuevo Artículo</button>
      <button class="btn btn-sec" id="btn-export-csv" style="width:100%"><i data-lucide="download"></i>Exportar Planilla</button>
    </div>
  </aside>

  <section style="width:100%">
    <div id="view-dashboard" class="view-section active">
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon"><i data-lucide="box"></i></div>
          <div><div class="stat-num" id="stat-productos">0</div><div class="stat-label">Items en Base de Datos</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon success"><i data-lucide="dollar-sign"></i></div>
          <div><div class="stat-num" id="stat-ventas">$0.00</div><div class="stat-label">Caja de Hoy</div></div>
        </div>
      </div>
    </div>

    <div id="view-catalogo" class="view-section">
      <div class="panel">
        <div class="panel-title">Inventario General</div>
        <div style="position:relative; display:flex; align-items:center;">
          <input type="text" id="f-keyword" placeholder="Buscar por descripción, marca o código de artículo..." style="padding-left:36px;">
          <i data-lucide="search" style="position:absolute; left:12px; color:var(--text-muted); width:16px; height:16px;"></i>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr><th>Código</th><th>Descripción</th><th>Marca</th><th>Disponibilidad</th><th>Precio</th></tr>
            </thead>
            <tbody id="tabla-productos">
              <tr><td colspan="5" style="text-align:center; color:var(--text-muted)">Conectando inventario...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="view-ventas" class="view-section">
      <div class="panel">
        <div class="panel-title">Módulo de Facturación</div>
        <div style="display:grid; grid-template-columns:1fr 120px 120px; gap:12px; margin-bottom:16px">
          <input type="text" id="venta-search" placeholder="Escriba código de pieza...">
          <input type="number" id="venta-cant" value="1" min="1">
          <button class="btn" id="btn-agregar-venta"><i data-lucide="shopping-bag"></i>Añadir</button>
        </div>
        <div class="table-container">
          <table>
            <thead><tr><th>Repuesto</th><th>Cantidad</th><th>Subtotal</th></tr></thead>
            <tbody id="lista-venta-actual">
              <tr><td colspan="3" style="text-align:center; color:var(--text-muted)">El carrito está vacío</td></tr>
            </tbody>
          </table>
        </div>
        <button class="btn success" id="btn-procesar-venta" style="margin-top:16px; width:100%; justify-content:center; padding:12px"><i data-lucide="check-circle"></i>Confirmar y Restar Stock</button>
      </div>
    </div>
  </section>
</main>

<div class="modal" id="modal-nuevo-articulo">
  <div class="modal-content">
    <button class="modal-close" onclick="UI.closeModal('modal-nuevo-articulo')"><i data-lucide="x" style="width:20px; height:20px;"></i></button>
    <div class="panel-title" style="margin-bottom:24px; font-size:14px; color:#fff">Ingresar Nueva Pieza</div>
    <form>
      <div class="form-group"><label>Código de Artículo</label><input type="text" required id="p-codigo" placeholder="Ej: BAN-3242"></div>
      <div class="form-group"><label>Descripción / Nombre</label><input type="text" required id="p-desc" placeholder="Ej: Pastilla de Freno Delantera"></div>
      <div class="form-group"><label>ID de Marca (Base de datos)</label><input type="number" required id="p-marca" placeholder="Ej: 1"></div>
      <div class="form-group" style="display:grid; grid-template-columns:1fr 1fr; gap:16px">
        <div><label>Stock Físico</label><input type="number" required value="0" id="p-stock"></div>
        <div><label>Precio de Venta</label><input type="number" required step="0.01" value="0.00" id="p-precio"></div>
      </div>
      <button type="submit" class="btn" style="width:100%; justify-content:center; margin-top:12px; padding:12px"><i data-lucide="database"></i>Guardar en Base de Datos</button>
    </form>
  </div>
</div>

<script>
// CONFIGURACIÓN CENTRAL DE SUPABASE
const SUPABASE_URL = "https://lyyxydfeojppzypvyjlb.supabase.co"; // URL Real
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5eXh5ZGZlb2pwcHp5cHZ5amxiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMTY0ODAsImV4cCI6MjA5NDg5MjQ4MH0.eXaULzQFMADmS3LF6usHtUdsaNkizmF-4UICfj4Gn4c";

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// GESTIÓN DE AUTENTICACIÓN
const Auth = {
  async init() {
    try {
      const { data } = await _supabase.auth.getSession();
      if (data.session) {
        document.getElementById('auth-screen').style.display = 'none';
        Productos.cargar();
      }
      
      const form = document.getElementById('auth-form');
      form?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        const errDiv = document.getElementById('auth-error');
        errDiv.style.display = 'none';

        try {
          const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          document.getElementById('auth-screen').style.display = 'none';
          Productos.cargar();
        } catch (err) {
          errDiv.innerText = err.message;
          errDiv.style.display = 'block';
        }
      });

      document.getElementById('btn-logout')?.addEventListener('click', async () => {
        await _supabase.auth.signOut();
        location.reload();
      });
    } catch (err) {
      console.error('Error Auth:', err);
    }
  }
};

// CONTROL DE INVENTARIO (Lectura y Escritura Real)
const Productos = {
  async cargar() {
    const tbody = document.getElementById('tabla-productos');
    if (!tbody) return;

    try {
      const keyword = document.getElementById('f-keyword')?.value || '';
      let query = _supabase
        .from('articulos') // Tu tabla SQL
        .select(`
          id,
          codigo_articulo,
          descripcion,
          stock,
          precio_venta_actual,
          marcas(nombre)
        `)
        .is('deleted_at', null)
        .order('descripcion');

      if (keyword) {
        query = query.or(`descripcion.ilike.%${keyword}%,codigo_articulo.ilike.%${keyword}%`); // Buscador Inteligente
      }

      const { data, error } = await query;
      if (error) throw error;

      if (!data || data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">No se encontraron artículos en inventario</td></tr>`;
        return;
      }

      tbody.innerHTML = data.map(p => {
        const stockStatus = p.stock <= 3 ? 'badge-low' : 'badge-ok';
        const stockLabel = p.stock <= 3 ? `Bajo (${p.stock})` : `${p.stock} U.`;
        return `
          <tr>
            <td><strong style="color:var(--accent)">${p.codigo_articulo || '-'}</strong></td>
            <td>${p.descripcion || '-'}</td>
            <td>${p.marcas?.nombre || 'General'}</td>
            <td><span class="badge ${stockStatus}">${stockLabel}</span></td>
            <td><strong>$${Number(p.precio_venta_actual || 0).toFixed(2)}</strong></td>
          </tr>
        `;
      }).join('');

      document.getElementById('stat-productos').innerText = data.length;
    } catch (err) {
      console.error(err);
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--danger)">Error al procesar la consulta con Supabase</td></tr>`;
    }
  },

  async guardar(e) {
    e.preventDefault();
    try {
      const nuevoArticulo = {
        codigo_articulo: document.getElementById('p-codigo').value,
        descripcion: document.getElementById('p-desc').value,
        marca_id: parseInt(document.getElementById('p-marca').value || 1),
        stock: parseInt(document.getElementById('p-stock').value || 0),
        precio_venta_actual: parseFloat(document.getElementById('p-precio').value || 0)
      };

      const { error } = await _supabase.from('articulos').insert([nuevoArticulo]);
      if (error) throw error;

      UI.closeModal('modal-nuevo-articulo');
      Productos.cargar();
      alert('Artículo insertado correctamente en Supabase');
    } catch (err) {
      console.error(err);
      alert('Error guardando artículo: ' + err.message);
    }
  }
};

// MANEJO DE VISTAS Y MODALES
const UI = {
  init() {
    document.querySelectorAll('[data-view]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        btn.classList.add('active');
        const view = document.getElementById(`view-${btn.dataset.view}`);
        view?.classList.add('active');
      });
    });
    lucide.createIcons(); // Carga de iconos modernos
  },
  openModal(id) { document.getElementById(id).style.display = 'flex'; },
  closeModal(id) { document.getElementById(id).style.display = 'none'; }
};

// LÓGICA DE VENTAS (Preparada para el futuro)
const Ventas = {
  actual: [],
  agregar() { alert('Módulo de transacciones en construcción.'); },
  procesar() { alert('Venta registrada provisionalmente.'); }
};

// CARGA INICIAL DEL SISTEMA
document.addEventListener('DOMContentLoaded', () => {
  Auth.init();
  UI.init();

  document.getElementById('btn-nuevo-art')?.addEventListener('click', () => UI.openModal('modal-nuevo-articulo'));
  document.querySelector('#modal-nuevo-articulo form')?.addEventListener('submit', (e) => Productos.guardar(e));
  document.getElementById('f-keyword')?.addEventListener('input', () => Productos.cargar());
  document.getElementById('btn-agregar-venta')?.addEventListener('click', () => Ventas.agregar());
  document.getElementById('btn-procesar-venta')?.addEventListener('click', () => Ventas.procesar());
});
</script>
</body>
</html>
