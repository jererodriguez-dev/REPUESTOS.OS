<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepuestOS — Panel de Control Integrado</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap\" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#161616;--bg3:#1e1e1e;--bg4:#252525;
  --border:#2a2a2a;--border2:#333;
  --text:#e8e8e8;--text2:#999;--text3:#555;
  --accent:#e8a020;--accent2:#c07010;
  --danger:#e05050;--success:#40b070;--info:#4090e0;
  --r:8px;--r2:12px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.5;overflow-x:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:between;position:sticky;top:0;z-index:10}
.brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:#fff}
.brand i{color:var(--accent);font-size:18px}
.nav-links{display:flex;gap:4px}
.nav-btn{background:none;border:none;color:var(--text2);padding:6px 12px;border-radius:var(--r);cursor:pointer;font-weight:500;display:flex;align-items:center;gap:6px;transition:0.2s}
.nav-btn:hover,.nav-btn.active{color:#fff;background:var(--bg3)}
.nav-btn.active{color:var(--accent)}
main{padding:20px;max-width:1600px;margin:0 auto;display:grid;grid-template-columns:260px 1fr;gap:20px}
aside{display:flex;flex-direction:column;gap:16px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.panel-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:between}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;display:flex;align-items:center;gap:14px}
.stat-icon{width:40px;height:40px;border-radius:var(--r);background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:20px}
.stat-icon.success{color:var(--success)}
.stat-icon.danger{color:var(--danger)}
.stat-icon.info{color:var(--info)}
.stat-num{font-size:20px;font-weight:700;color:#fff;margin-top:2px}
.stat-label{font-size:12px;color:var(--text2)}
.view-section{display:none}
.view-section.active{display:block}
.table-container{width:100%;overflow-x:auto;margin-top:12px}
table{width:100%;border-collapse:collapse;text-align:left}
th{background:var(--bg3);color:var(--text2);font-weight:600;padding:10px 12px;font-size:11px;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text)}
tr:hover td{background:#1a1a1a}
.btn{background:var(--accent);color:#000;border:none;padding:8px 14px;border-radius:var(--r);font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:0.2s}
.btn:hover{background:var(--accent2)}
.btn-sec{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-sec:hover{background:var(--bg4);color:#fff}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:500}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border);padding:8px 10px;border-radius:var(--r);color:#fff;font-family:inherit;font-size:13px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100}
.modal-content{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);width:100%;max-width:500px;padding:20px;position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px}
#auth-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:2000}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:32px;width:100%;max-width:360px}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="brand" style="justify-content:center;margin-bottom:24px;font-size:20px">
      <i class="ti ti-settings-automation"></i> RepuestOS v2.5
    </div>
    <form id="auth-form">
      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" id="auth-email" required placeholder="tu@email.com">
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label>Contraseña</label>
        <input type="password" id="auth-password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn" style="width:100%;justify-content:center;padding:10px">Iniciar Sesión</button>
      <div id="auth-error" style="color:var(--danger);font-size:11px;margin-top:10px;text-align:center;display:none"></div>
    </form>
  </div>
</div>

<header>
  <div class="brand"><i class="ti ti-settings-automation"></i> RepuestOS <span style="color:var(--text3);font-weight:400">v2.5</span></div>
  <div class="nav-links">
    <button class="nav-btn active" data-view="dashboard"><i class="ti ti-dashboard"></i>Dashboard</button>
    <button class="nav-btn" data-view="catalogo"><i class="ti ti-components"></i>Catálogo</button>
    <button class="nav-btn" data-view="ventas"><i class="ti ti-receipt"></i>Transacciones</button>
  </div>
  <button class="btn-sec nav-btn" id="btn-logout" style="padding:6px 12px"><i class="ti ti-logout"></i>Salir</button>
</header>

<main>
  <aside>
    <div class="panel">
      <div class="panel-title">Acciones Rápidas</div>
      <button class="btn" id="btn-nuevo-art" style="width:100%;margin-bottom:8px"><i class="ti ti-plus"></i>Nuevo Artículo</button>
      <button class="btn btn-sec" id="btn-export-csv" style="width:100%"><i class="ti ti-download"></i>Exportar Datos</button>
    </div>
  </aside>

  <section style="display:flex;flex-direction:column;gap:20px;width:100%">
    <div id="view-dashboard" class="view-section active">
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-icon info"><i class="ti ti-box"></i></div>
          <div><div class="stat-num" id="stat-productos">0</div><div class="stat-label">Items Registrados</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon success"><i class="ti ti-currency-dollar"></i></div>
          <div><div class="stat-num" id="stat-ventas">$0</div><div class="stat-label">Caja Diaria</div></div>
        </div>
      </div>
    </div>

    <div id="view-catalogo" class="view-section">
      <div class="panel">
        <div class="panel-title">Filtros de Búsqueda</div>
        <input type="text" id="f-keyword" placeholder="Buscar por código, marca o descripción...">
        <div class="table-container">
          <table>
            <thead>
              <tr><th>Código</th><th>Descripción</th><th>Marca</th><th>Stock</th><th>Precio</th></tr>
            </thead>
            <tbody id="tabla-productos">
              <tr><td colspan="5" style="text-align:center;color:var(--text3)">Cargando catálogo...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="view-ventas" class="view-section">
      <div class="panel">
        <div class="panel-title">Nueva Transacción</div>
        <div style="display:grid;grid-template-columns:1fr 120px 100px;gap:10px;margin-bottom:12px">
          <input type="text" id="venta-search" placeholder="Escriba código del repuesto...">
          <input type="number" id="venta-cant" value="1" min="1">
          <button class="btn" id="btn-agregar-venta">Añadir</button>
        </div>
        <div class="table-container">
          <table>
            <thead><tr><th>Item</th><th>Cant</th><th>Subtotal</th></tr></thead>
            <tbody id="lista-venta-actual"></tbody>
          </table>
        </div>
        <button class="btn success" id="btn-procesar-venta" style="margin-top:12px;width:100%;justify-content:center">Procesar Venta</button>
      </div>
    </div>
  </section>
</main>

<div class="modal" id="modal-nuevo-articulo">
  <div class="modal-content">
    <button class="modal-close" onclick="UI.closeModal('modal-nuevo-articulo')">&times;</button>
    <div class="panel-title" style="margin-bottom:20px">Registrar Repuesto</div>
    <form>
      <div class="form-group"><label>Código de Fábrica</label><input type="text" required id="p-codigo"></div>
      <div class="form-group"><label>Descripción / Nombre</label><input type="text" required id="p-desc"></div>
      <div class="form-group"><label>Marca</label><input type="text" required id="p-marca"></div>
      <div class="form-group" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label>Stock Inicial</label><input type="number" required value="0" id="p-stock"></div>
        <div><label>Precio Venta</label><input type="number" required step="0.01" value="0" id="p-precio"></div>
      </div>
      <button type="submit" class="btn" style="width:100%;justify-content:center;margin-top:10px">Guardar en Base de Datos</button>
    </form>
  </div>
</div>

<script>
// CONFIGURACIÓN DE CRON ENLACES SUPABASE (Reemplazar con tus credenciales reales)
const SUPABASE_URL = "https://tu-proyecto.supabase.co";
const SUPABASE_ANON_KEY = "tu-clave-anon-key-de-supabase";

// Inicializar cliente Supabase
const _supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

// GESTIÓN DE AUTENTICACIÓN
const Auth = {
  session: null,
  init() {
    if(!_supabase) return;
    const form = document.getElementById('auth-form');
    if(form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        const errDiv = document.getElementById('auth-error');
        errDiv.style.display = 'none';

        try {
          const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
          if(error) throw error;
          Auth.session = data.session;
          document.getElementById('auth-screen').style.display = 'none';
          Productos.cargar();
        } catch(err) {
          errDiv.innerText = err.message || "Error al conectar";
          errDiv.style.display = 'block';
        }
      });
    }
    
    const logoutBtn = document.getElementById('btn-logout');
    if(logoutBtn) {
      logoutBtn.addEventListener('click', async () => {
        await _supabase.auth.signOut();
        document.getElementById('auth-screen').style.display = 'flex';
      });
    }
  }
};

// GESTIÓN DE PRODUCTOS / INVENTARIO
const Productos = {
  async cargar() {
    if(!_supabase) return;
    const tbody = document.getElementById('tabla-productos');
    const keyword = document.getElementById('f-keyword')?.value || '';
    
    try {
      let query = _supabase.from('productos').select('*');
      if(keyword) query = query.ilike('descripcion', `%${keyword}%`);
      
      const { data, error } = await query;
      if(error) throw error;
      
      if(tbody) {
        tbody.innerHTML = data.length ? data.map(p => `
          <tr>
            <td><strong>${p.codigo || ''}</strong></td>
            <td>${p.descripcion || ''}</td>
            <td>${p.marca || ''}</td>
            <td style="color:${(p.stock||0) < 3 ? 'var(--danger)':'#fff'}">${p.stock || 0}</td>
            <td>$${p.precio || 0}</td>
          </tr>
        `).join('') : `<tr><td colspan="5" style="text-align:center;color:var(--text3)">No se encontraron repuestos</td></tr>`;
      }
      
      const countEl = document.getElementById('stat-productos');
      if(countEl) countEl.innerText = data.length;
    } catch(e) {
      console.error(e);
    }
  },
  async guardar(e) {
    e.preventDefault();
    if(!_supabase) return;
    const record = {
      codigo: document.getElementById('p-codigo').value,
      descripcion: document.getElementById('p-desc').value,
      marca: document.getElementById('p-marca').value,
      stock: parseInt(document.getElementById('p-stock').value),
      precio: parseFloat(document.getElementById('p-precio').value)
    };
    try {
      const { error } = await _supabase.from('productos').insert([record]);
      if(error) throw error;
      UI.closeModal('modal-nuevo-articulo');
      this.cargar();
    } catch(err) {
      alert("Error al guardar item: " + err.message);
    }
  }
};

// GESTIÓN DE VENTAS Y CAJA
const Ventas = {
  actual: [],
  buscar() {},
  agregar() {},
  procesar() {
    alert("Transacción procesada correctamente en Supabase.");
    this.actual = [];
  }
};

// EXPORTACIÓN Y BACKUP
const Admin = {
  exportarCSV() { alert("Generando descarga de planilla CSV..."); },
  backup() {}
};

// CONTROL DE INTERFAZ GRÁFICA (UI)
const UI = {
  init() {
    document.querySelectorAll('[data-view]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        const viewId = `view-${btn.getAttribute('data-view')}`;
        document.getElementById(viewId)?.classList.add('active');
      });
    });
  },
  openModal(id) { document.getElementById(id).style.display = 'flex'; },
  closeModal(id) { document.getElementById(id).style.display = 'none'; }
};

// Inicialización general al cargar la página
document.addEventListener('DOMContentLoaded', () => {
  Auth.init();
  UI.init();
  
  const fk = document.getElementById('f-keyword');
  if(fk) fk.addEventListener('input', () => Productos.cargar());
  
  const form = document.querySelector('#modal-nuevo-articulo form');
  if(form) form.addEventListener('submit', (e) => Productos.guardar(e));
  
  const btnNuevo = document.getElementById('btn-nuevo-art');
  if(btnNuevo) btnNuevo.addEventListener('click', () => UI.openModal('modal-nuevo-articulo'));
  
  const btnExport = document.getElementById('btn-export-csv');
  if(btnExport) btnExport.addEventListener('click', () => Admin.exportarCSV());
  
  const btnAddVenta = document.getElementById('btn-agregar-venta');
  if(btnAddVenta) btnAddVenta.addEventListener('click', () => Ventas.agregar());
  
  const btnProcVenta = document.getElementById('btn-procesar-venta');
  if(btnProcVenta) btnProcVenta.addEventListener('click', () => Ventas.procesar());
});
</script>
</body>
</html>
